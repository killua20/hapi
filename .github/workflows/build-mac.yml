name: Build Mac ARM64

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v2
      
      - name: Install dependencies
        run: bun install
      
      - name: Download tunwg tools
        run: bun run download:tunwg
      
      - name: Build web
        run: |
          cd web
          bun install
          bun run build
      
      - name: Generate embedded assets
        run: cd hub && bun run generate:embedded-web-assets
      
      - name: Build Mac ARM64 executable
        run: |
          cd cli
          bun run scripts/build-executable.ts --target bun-darwin-arm64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hapi-darwin-arm64
          path: cli/dist-exe/bun-darwin-arm64/hapi
          retention-days: 7
